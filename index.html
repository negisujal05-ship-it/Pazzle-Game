<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🧩 Riddle Quest · 15 Levels</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    body {
      min-height: 100vh;
      background: linear-gradient(145deg, #0f121f 0%, #1a1e30 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1.2rem;
    }
    .game-container {
      max-width: 680px;
      width: 100%;
      background: rgba(20, 24, 40, 0.92);
      backdrop-filter: blur(4px);
      border-radius: 3rem 3rem 1.8rem 1.8rem;
      border: 1px solid #4a4030;
      box-shadow: 0 30px 60px -10px rgba(0,0,0,0.9), 0 0 0 1px #6a5c44;
      padding: 2rem 1.8rem 2rem;
      transition: all 0.3s;
    }
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: 0.6rem;
    }
    .level-badge {
      background: #2a2438;
      padding: 0.3rem 1.2rem;
      border-radius: 60px;
      border: 1px solid #7a6a4a;
      color: #e6dbbc;
      font-weight: 600;
      font-size: 1rem;
      letter-spacing: 1px;
      box-shadow: inset 0 1px 0 #4a3f2a;
    }
    .progress-wrap {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      background: #141a26;
      padding: 0.2rem 1rem 0.2rem 0.6rem;
      border-radius: 60px;
      border: 1px solid #3d3524;
    }
    .progress-steps {
      display: flex;
      gap: 4px;
      align-items: center;
    }
    .step-dot {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #2f2a3a;
      border: 1px solid #4d422e;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 8px;
      color: #7a6a4a;
    }
    .step-dot.done {
      background: #5f8b4b;
      border-color: #8fc77a;
      box-shadow: 0 0 8px #6aaa4a;
      color: #e4f0d0;
    }
    .step-dot.active {
      background: #d4b87a;
      border-color: #f0d89a;
      box-shadow: 0 0 12px #e6c87a;
      color: #1a1e2a;
      font-weight: 700;
    }
    .step-dot.wrong {
      background: #a5453a;
      border-color: #d97a6a;
      animation: shake 0.4s;
    }
    @keyframes shake {
      0%,100%{ transform: translateX(0); }
      25%{ transform: translateX(-6px); }
      75%{ transform: translateX(6px); }
    }
    .riddle-card {
      background: #121725;
      border-radius: 2.2rem;
      padding: 1.8rem 1.5rem;
      border: 1px solid #3d3524;
      box-shadow: inset 0 4px 12px rgba(0,0,0,0.7);
      margin: 0.8rem 0 1.2rem;
      min-height: 140px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .riddle-number {
      color: #7a6a4a;
      font-size: 0.8rem;
      letter-spacing: 2px;
      margin-bottom: 0.6rem;
      border-bottom: 1px dashed #2f2a1f;
      padding-bottom: 0.4rem;
    }
    .riddle-text {
      color: #efe6d3;
      font-size: 1.5rem;
      line-height: 1.6;
      font-weight: 300;
      text-align: center;
      word-break: break-word;
    }
    .riddle-text .highlight {
      background: #272a3a;
      padding: 0.1rem 0.8rem;
      border-radius: 40px;
      color: #f5d99b;
      border: 1px solid #5a4d30;
      font-weight: 400;
    }
    .hint-area {
      color: #a09278;
      text-align: center;
      font-size: 0.85rem;
      margin-top: 0.6rem;
      border-top: 1px solid #2f2a1f;
      padding-top: 0.6rem;
      letter-spacing: 0.3px;
    }
    .input-area {
      background: #191e2b;
      border-radius: 4rem;
      padding: 0.2rem 0.2rem 0.2rem 1.8rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      border: 1px solid #685b42;
      box-shadow: inset 0 2px 6px #0a0c12;
      margin: 1.2rem 0 0.8rem;
    }
    .input-area input {
      flex: 1;
      background: transparent;
      border: none;
      padding: 0.9rem 0.2rem;
      color: #f5e7cf;
      font-size: 1.1rem;
      outline: none;
      min-width: 0;
    }
    .input-area input::placeholder {
      color: #4a4260;
      font-weight: 300;
      font-size: 0.95rem;
    }
    .input-area button {
      background: #c9b484;
      border: none;
      padding: 0.7rem 1.8rem;
      border-radius: 40px;
      font-weight: 600;
      color: #171c27;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.15s;
      box-shadow: 0 4px 0 #6d5d3e;
      border: 1px solid #e5cf9c;
      white-space: nowrap;
      letter-spacing: 0.5px;
    }
    .input-area button:hover {
      transform: translateY(-2px);
      background: #dbcaa0;
      box-shadow: 0 6px 0 #6d5d3e;
    }
    .input-area button:active {
      transform: translateY(4px);
      box-shadow: 0 1px 0 #6d5d3e;
    }
    .feedback {
      min-height: 2.8rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      font-size: 1.1rem;
      font-weight: 400;
      padding: 0.3rem 0.8rem;
      border-radius: 60px;
      margin: 0.2rem 0 0.6rem;
      transition: 0.15s;
    }
    .feedback.correct {
      color: #b3e4b0;
      background: #1b3a1b;
      border: 1px solid #7bbf7b;
    }
    .feedback.wrong {
      color: #f7b0a0;
      background: #3f1f1f;
      border: 1px solid #bf6b5a;
      animation: shake 0.4s;
    }
    .feedback.neutral {
      color: #b3a78b;
    }
    .feedback.level-done {
      color: #f5e7a0;
      background: #2f3a1f;
      border: 1px solid #b7a04a;
    }
    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 1.2rem;
      flex-wrap: wrap;
      gap: 0.6rem;
      border-top: 1px solid #2f2a1f;
      padding-top: 1rem;
    }
    .reset-btn {
      background: none;
      border: 1px solid #4d422e;
      color: #b7a78a;
      padding: 0.3rem 1.2rem;
      border-radius: 40px;
      cursor: pointer;
      font-size: 0.8rem;
      transition: 0.2s;
    }
    .reset-btn:hover {
      background: #2f2a1f;
      color: #efe6d3;
      border-color: #7a6a4a;
    }
    .game-over {
      color: #e07a6a;
      font-weight: 600;
      letter-spacing: 1px;
    }
    .win-text {
      color: #b3e4b0;
      font-weight: 600;
    }
    @media (max-width: 480px) {
      .riddle-text { font-size: 1.2rem; }
      .input-area { flex-wrap: wrap; background: transparent; padding: 0; border: none; box-shadow: none; gap: 0.6rem; }
      .input-area input { background: #191e2b; border-radius: 40px; padding: 0.9rem 1.2rem; border: 1px solid #685b42; width: 100%; }
      .input-area button { width: 100%; justify-content: center; }
      .step-dot { width: 16px; height: 16px; font-size: 6px; }
    }
  </style>
</head>
<body>

      // ---------- GAME STATE ----------

      }
