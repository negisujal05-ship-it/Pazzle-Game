<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Riddle · I am not alive</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, 'Segoe UI', Roboto, sans-serif;
    }
    body {
      min-height: 100vh;
      background: linear-gradient(145deg, #1a1e2c 0%, #2b2f44 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1.5rem;
    }
    .game-card {
      max-width: 560px;
      width: 100%;
      background: rgba(22, 26, 40, 0.85);
      backdrop-filter: blur(4px);
      border-radius: 3.5rem 3.5rem 2rem 2rem;
      box-shadow: 0 25px 50px -8px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,215,120,0.15);
      padding: 2rem 1.8rem 2.2rem;
      transition: all 0.2s;
      border: 1px solid #4a3f2e;
    }
    .riddle-header {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 1.6rem;
      border-bottom: 1px dashed #6a5c44;
      padding-bottom: 1rem;
    }
    .riddle-header h2 {
      color: #f2e3c4;
      font-weight: 400;
      letter-spacing: 2px;
      font-size: 1.1rem;
      text-transform: uppercase;
      background: #2f2a1f;
      padding: 0.3rem 1.2rem;
      border-radius: 40px;
      border: 1px solid #b79b6b;
      box-shadow: inset 0 1px 0 #6a5c44;
    }
    .riddle-icon {
      font-size: 1.7rem;
      margin-left: auto;
      opacity: 0.7;
    }
    .riddle-box {
      background: #0f121b;
      border-radius: 2.5rem;
      padding: 1.8rem 1.5rem;
      box-shadow: inset 0 6px 12px rgba(0,0,0,0.6), 0 2px 0 #52462e;
      border: 1px solid #3d3524;
      margin-bottom: 2rem;
    }
    .riddle-text {
      color: #efe6d3;
      font-size: 1.6rem;
      line-height: 1.5;
      font-weight: 300;
      text-align: center;
      letter-spacing: 0.5px;
      word-break: break-word;
    }
    .riddle-text span {
      display: inline-block;
      background: #272a3a;
      padding: 0.1rem 0.8rem;
      border-radius: 40px;
      color: #f5d99b;
      border: 1px solid #5a4d30;
      font-weight: 400;
    }
    .hint-line {
      color: #b7a78a;
      text-align: center;
      font-size: 0.9rem;
      margin-top: 0.8rem;
      border-top: 1px solid #3d3524;
      padding-top: 0.8rem;
      letter-spacing: 0.3px;
    }
    .answer-area {
      background: #191e2b;
      border-radius: 4rem;
      padding: 0.2rem 0.2rem 0.2rem 1.8rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      border: 1px solid #685b42;
      box-shadow: inset 0 2px 6px #0a0c12;
      margin: 1.8rem 0 1.2rem;
    }
    .answer-area input {
      flex: 1;
      background: transparent;
      border: none;
      padding: 0.9rem 0.2rem;
      color: #f5e7cf;
      font-size: 1.2rem;
      outline: none;
      min-width: 0;
      letter-spacing: 0.5px;
    }
    .answer-area input::placeholder {
      color: #5b5370;
      font-weight: 300;
      font-size: 1rem;
      letter-spacing: 0.3px;
    }
    .answer-area button {
      background: #c9b484;
      border: none;
      padding: 0.8rem 1.8rem;
      border-radius: 40px;
      font-weight: 600;
      color: #171c27;
      font-size: 1.1rem;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 0 #6d5d3e, 0 2px 8px rgba(0,0,0,0.5);
      letter-spacing: 1px;
      border: 1px solid #e5cf9c;
      white-space: nowrap;
    }
    .answer-area button:hover {
      transform: translateY(-2px);
      background: #dbcaa0;
      box-shadow: 0 6px 0 #6d5d3e;
    }
    .answer-area button:active {
      transform: translateY(4px);
      box-shadow: 0 1px 0 #6d5d3e;
    }
    .feedback {
      min-height: 2.8rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      font-size: 1.2rem;
      font-weight: 400;
      padding: 0.4rem 0.8rem;
      border-radius: 60px;
      margin: 0.5rem 0 0.2rem;
      transition: all 0.15s;
    }
    .feedback.correct {
      color: #b3e4b0;
      background: #1b3a1b;
      border: 1px solid #7bbf7b;
    }
    .feedback.wrong {
      color: #f7b0a0;
      background: #3f1f1f;
      border: 1px solid #bf6b5a;
    }
    .feedback.neutral {
      color: #b3a78b;
    }
    .install-row {
      margin-top: 2.2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid #3d3524;
      padding-top: 1.2rem;
      flex-wrap: wrap;
      gap: 0.6rem;
    }
    .install-badge {
      background: #191e2b;
      border-radius: 60px;
      padding: 0.4rem 1.2rem 0.4rem 1.6rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      border: 1px solid #6a5c44;
    }
    .install-badge span {
      color: #dac29c;
      font-weight: 300;
      letter-spacing: 0.5px;
      font-size: 0.9rem;
    }
    .install-badge .badge-icon {
      background: #c9b484;
      color: #121624;
      border-radius: 40px;
      padding: 0.2rem 1rem;
      font-weight: 600;
      font-size: 0.8rem;
      letter-spacing: 0.5px;
    }
    .game-meta {
      display: flex;
      gap: 0.8rem;
      align-items: center;
      color: #8b7d62;
      font-size: 0.8rem;
    }
    .game-meta .pill {
      background: #2a2a3a;
      padding: 0.2rem 1.2rem;
      border-radius: 40px;
      border: 1px solid #4d422e;
    }
    .footnote {
      color: #6b604b;
      margin-top: 1rem;
      text-align: center;
      font-size: 0.7rem;
      letter-spacing: 0.8px;
      border-top: 1px solid #2f2a1f;
      padding-top: 0.8rem;
    }
    .reset-link {
      color: #b79b6b;
      background: none;
      border: none;
      text-decoration: underline dotted;
      cursor: pointer;
      font-size: 0.8rem;
      padding: 0.2rem 0.4rem;
      border-radius: 20px;
    }
    @media (max-width: 480px) {
      .riddle-text { font-size: 1.3rem; }
      .answer-area { flex-wrap: wrap; background: transparent; padding: 0; border: none; box-shadow: none; gap: 0.6rem; }
      .answer-area input { background: #191e2b; border-radius: 40px; padding: 0.9rem 1.2rem; border: 1px solid #685b42; width: 100%; }
      .answer-area button { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>
  <div class="game-card" role="main">
    <div class="riddle-header">
      <h2>⚡ RIDDLE</h2>
      <div class="riddle-icon">💀</div>
    </div>

    <div class="riddle-box">
      <div class="riddle-text">
        मैं जीवित नहीं हूं. <br>
        लेकिन मैं मर सकता हूँ। <br>
        <span>मैं कौन हूँ?</span>
      </div>
      <div class="hint-line">⚡ फोन · बैटरी · Bone Treasure</div>
    </div>

    <div class="answer-area">
      <input type="text" id="answerInput" placeholder="type your answer..." autocomplete="off" aria-label="Your answer">
      <button id="checkBtn">→ CHECK</button>
    </div>

    <div id="feedback" class="feedback neutral">💡 think about what can “die” but isn’t alive</div>

    <div class="install-row">
      <div class="install-badge">
        <span>📱 Bone Treasure</span>
        <span class="badge-icon">Casual</span>
      </div>
      <div class="game-meta">
        <span class="pill">⬇ Install now</span>
        <span>👤 Spencer Neylon</span>
        <span>👤 Sarah</span>
      </div>
    </div>

    <div class="footnote">
      <button class="reset-link" id="resetHintBtn">↺ reset hint</button>
      <span style="margin:0 0.6rem;">·</span>
      <span>riddle from 2026 · 🕯️</span>
    </div>
  </div>

  <script>
    (function() {
      const answerInput = document.getElementById('answerInput');
      const checkBtn = document.getElementById('checkBtn');
      const feedback = document.getElementById('feedback');

      // The riddle solution: "battery" (also accepts "cell", "phone battery", "battery cell")
      const validAnswers = ['battery', 'cell', 'phone battery', 'battery cell', 'बैटरी', 'batterie', 'batería'];

      // Easter egg / extra clue from the image: Bone Treasure, Spencer, Sarah → but answer stays battery.
      function checkAnswer(userAnswer) {
        if (!userAnswer) return null;
        const normalized = userAnswer.trim().toLowerCase().replace(/\s+/g, ' ');
        // direct match
        for (let valid of validAnswers) {
          if (normalized === valid || normalized.includes(valid) && valid.length > 3) {
            return 'correct';
          }
        }
        // if it contains "phone" and "battery" separately
        if (normalized.includes('phone') && normalized.includes('battery')) return 'correct';
        if (normalized.includes('batter') || normalized.includes('बैट')) return 'correct';
        return 'wrong';
      }

      function setFeedback(state, message) {
        feedback.className = 'feedback ' + state;
        feedback.textContent = message;
      }

      function handleSubmit() {
        const raw = answerInput.value;
        if (!raw.trim()) {
          setFeedback('neutral', '✏️ enter your guess (hint: it’s not alive but can “die”)');
          return;
        }
        const result = checkAnswer(raw);
        if (result === 'correct') {
          setFeedback('correct', '✅ Correct! “Battery” — not alive, but it can die. ⚡');
          // extra style flourish
          feedback.style.transition = '0.2s';
        } else if (result === 'wrong') {
          setFeedback('wrong', '❌ Not that. Think about what runs out of “life” in a phone...');
        } else {
          setFeedback('neutral', '🤔 try again. hint: it powers something, and can “die”');
        }
      }

      // Event listeners
      checkBtn.addEventListener('click', handleSubmit);

      answerInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          handleSubmit();
        }
      });

      // reset hint (just sets neutral feedback)
      document.getElementById('resetHintBtn').addEventListener('click', () => {
        setFeedback('neutral', '💡 think about what can “die” but isn’t alive');
        answerInput.value = '';
        answerInput.focus();
      });

      // extra: focus input on load
      window.addEventListener('load', () => {
        answerInput.focus();
        // Prefill with a subtle hint? No, keep clean.
      });

      // also if user types "bone" or "treasure" we give a subtle nudge
      answerInput.addEventListener('input', function() {
        const val = this.value.trim().toLowerCase();
        if (val.includes('bone') || val.includes('treasure') || val.includes('spencer') || val.includes('sarah')) {
          // only if not already correct/wrong
          if (!feedback.classList.contains('correct') && !feedback.classList.contains('wrong')) {
            setFeedback('neutral', '🧩 those are clues from the image — but the answer is simpler');
          }
        }
        // if they type "phone" alone
        if (val === 'phone' || val === 'फोन') {
          setFeedback('neutral', '📱 phone needs something to live...');
        }
      });

      // additional hidden easter egg: if someone types "Bone Treasure" it gives a wink
      // but we handle it inside input.
    })();
  </script>
</body>
</html>
